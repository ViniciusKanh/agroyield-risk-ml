  ano_inicio: 2006
  ano_fim: 2024

sidra:
  tabela_pam_lavouras_temporarias: "1612"
  classificacao_produto_lavoura_temporaria: "81"
  codigo_produto_soja: "2713"
  # Variáveis serão baixadas como v/all e filtradas pelos nomes no tratamento.

nasa_power:
  community: "AG"
  parametros:
    - "PRECTOTCORR"
    - "T2M"
    - "T2M_MAX"
    - "T2M_MIN"
