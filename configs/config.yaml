  limite_municipios_por_area_soja: 80
  area_colhida_minima_media_ha: 1000

alvo:
  janela_media_movel: 3
  limiar_quebra: 0.80

modelagem:
  ano_treino_ate: 2020
  random_state: 42
  usar_feature_set: "conservador"
